name: CI

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install and build
        run: npm ci && npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.html
          test -f dist/.nojekyll
          test -f dist/app.js
          test -f dist/fuse.min.js
          test -f dist/styles.css
          test ! -f dist/data.json
